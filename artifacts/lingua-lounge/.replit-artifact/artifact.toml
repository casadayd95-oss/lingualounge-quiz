kind = "web"
previewPath = "/"
title = "LinguaLounge Article Quiz"
version = "1.0.0"
id = "artifacts/lingua-lounge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21690

[services.development]
run = "pnpm --filter @workspace/lingua-lounge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lingua-lounge", "run", "build" ]
publicDir = "artifacts/lingua-lounge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21690"
BASE_PATH = "/"
